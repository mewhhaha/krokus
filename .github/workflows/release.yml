name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.3"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build XPI
        run: bash scripts/build-xpi.sh

      - name: Read extension version
        id: manifest
        run: |
          VERSION="$(python3 - <<'PY'
          import json
          print(json.load(open("manifest.json"))["version"])
          PY
          )"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Resolve release tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          VERSION: ${{ steps.manifest.outputs.version }}
        run: |
          VERSIONED_ASSET="dist/friction-switch-${VERSION}.xpi"
          LATEST_ASSET="dist/friction-switch.xpi"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VERSIONED_ASSET" "$LATEST_ASSET" --clobber
          else
            gh release create "$TAG" "$VERSIONED_ASSET" "$LATEST_ASSET" \
              --target "${GITHUB_SHA}" \
              --title "$TAG" \
              --generate-notes
          fi
